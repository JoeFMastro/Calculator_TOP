<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="calculatorContainer">
    <div class="display-wrapper">
      <div id="expression" class="expression">0 + 0</div>
      <div id="display" class="display">0</div>
    </div>


    <!--first row-->
    <button id="btn btn_clear" onclick="clearAll()">C</button>
    <button id="btn btn_delete" onclick="backSpace()">⌫</button>
    <button id="btn btn_operator" onclick="setOperator('÷')">÷</button>

    <!--second row-->
    <button id="btn btn_number" onclick="addNumber('7')">7</button>
    <button id="btn btn_number" onclick="addNumber('8')">8</button>
    <button id="btn btn_number" onclick="addNumber('9')">9</button>
    <button id="btn btn_operator" onclick="setOperator('*')">*</button>

    <!--third row-->
    <button id="btn btn_number" onclick="addNumber('4')">4</button>
    <button id="btn btn_number" onclick="addNumber('5')">5</button>
    <button id="btn btn_number" onclick="addNumber('6')">6</button>
    <button id="btn btn_operator" onclick="setOperator('-')">-</button>


    <!--fourth row-->
    <button id="btn btn_number" onclick="addNumber('1')">1</button>
    <button id="btn btn_number" onclick="addNumber('2')">2</button>
    <button id="btn btn_number" onclick="addNumber('3')">3</button>
    <button id="btn btn_operator" onclick="setOperator('+')">+</button>

    <!--fifth row-->
    <button id="btn btn_number" onclick="addNumber('0')">0</button>
    <button class="btn btn-equals span-2" onclick="calculate()">=</button>
  </div>
</body>

</html>
